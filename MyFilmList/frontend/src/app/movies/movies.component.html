<nav class="navbar">
  <a routerLink="/movies" routerLinkActive="active">My Movies</a>
  <a routerLink="/catalog" routerLinkActive="active">Catalog</a>
  <button class="logout-btn" (click)="logout()">Logout</button>
</nav>

<div class="container">
  <div class="header">
    <h2>My Movies</h2>
    <a routerLink="/add-movie" class="btn-primary">+ Add Movie</a>
  </div>

  <p *ngIf="error" class="error">{{ error }}</p>

  <label>
    Filter:
    <select [(ngModel)]="filter">
      <option value="all">All</option>
      <option value="watched">Watched</option>
      <option value="plan">Plan list</option>
    </select>
  </label>

  <div *ngIf="movies.length > 0; else emptyList" class="movie-grid">
    <div class="movie-card" *ngFor="let movie of filteredMovies">
      
      <img
        [src]="movie.posterUrl ? 'http://localhost:4222' + movie.posterUrl : '/no-image.png'"
        [alt]="movie.title"
        class="movie-poster"
      />

      <h3>{{ movie.title }}</h3>
      <p class="year">{{ movie.year }}</p>

      <p><strong>Director:</strong> {{ movie.director }}</p>

      <label>
        Score:
        <select
          [ngModel]="movie.yourScore"
          (ngModelChange)="updateMovie(movie._id!, { yourScore: $event })"
          [ngModelOptions]="{ standalone: true }"
        >
          <option [ngValue]="null">-</option>
          <option *ngFor="let s of scores" [ngValue]="s">{{ s }}</option>
        </select>
      </label>

      <p *ngIf="movie.genres?.length">
        {{ movie.genres?.join(', ') }}
      </p>

      <p>
        <label>
          Status:
          <select
            [ngModel]="movie.watched ? 'watched' : 'plan'"
            (ngModelChange)="updateStatus(movie._id!, $event)"
            [ngModelOptions]="{ standalone: true }"
          >
            <option value="plan">Plan</option>
            <option value="watched">Watched</option>
          </select>
        </label>
      </p>

      <button class="btn-danger" (click)="deleteMovie(movie._id)">
        Delete
      </button>
    </div>
  </div>

  <ng-template #emptyList>
    <p class="empty">No movies yet.</p>
  </ng-template>
</div>
